name: Run script

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: composer install --no-dev --optimize-autoloader
      - name: Create .env file
        run: |
          echo "OCI_REGION=${{ secrets.OCI_REGION }}" >> .env
          echo "OCI_USER_ID=${{ secrets.OCI_USER_ID }}" >> .env
          echo "OCI_TENANCY_ID=${{ secrets.OCI_TENANCY_ID }}" >> .env
          echo "OCI_KEY_FINGERPRINT=${{ secrets.OCI_FINGERPRINT }}" >> .env
          echo "OCI_SUBNET_ID=${{ secrets.OCI_SUBNET_ID }}" >> .env
          echo "OCI_IMAGE_ID=${{ secrets.OCI_IMAGE_ID }}" >> .env
          echo "OCI_OCPUS=${{ secrets.OCI_OCPUS }}" >> .env
          echo "OCI_MEMORY_IN_GBS=${{ secrets.OCI_MEMORY_IN_GBS }}" >> .env
          echo "OCI_SHAPE=VM.Standard.A1.Flex" >> .env
          echo "OCI_MAX_INSTANCES=1" >> .env
          echo "OCI_SSH_PUBLIC_KEY=\"${{ secrets.OCI_SSH_PUBLIC_KEY }}\"" >> .env
      - name: Write private key file
        run: |
          echo "${{ secrets.OCI_KEY_VALUE }}" > private_key.pem
          chmod 600 private_key.pem
          echo "OCI_PRIVATE_KEY_FILENAME=$(pwd)/private_key.pem" >> .env
      - name: Debug .env
        run: cat .env
      - name: Run script
        run: php index.php
